version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: erp_db_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-erp_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network_prod
    # Não expor porta em produção
    # ports:
    #   - "5432:5432"

  web:
    build: .
    container_name: erp_web_prod
    command: gunicorn core_erp.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --max-requests 1000 --max-requests-jitter 100 --timeout 60 --access-logfile -
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-erp_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - static_volume_prod:/app/staticfiles
      - media_volume_prod:/app/media
      - logs_volume_prod:/app/logs
    restart: always
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp_network_prod
    # Não expor porta diretamente; usar Nginx
    # ports:
    #   - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: erp_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume_prod:/app/staticfiles:ro
      - media_volume_prod:/app/media:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web
    restart: always
    networks:
      - erp_network_prod

volumes:
  postgres_data_prod:
    driver: local
  static_volume_prod:
    driver: local
  media_volume_prod:
    driver: local
  logs_volume_prod:
    driver: local

networks:
  erp_network_prod:
    driver: bridge
