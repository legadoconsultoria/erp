version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: erp_db
    environment:
      POSTGRES_DB: ${DB_NAME:-erp_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  web:
    build: .
    container_name: erp_web
    command: gunicorn core_erp.wsgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      DEBUG: "${DEBUG:-False}"
      SECRET_KEY: "${SECRET_KEY:-django-insecure-^@aru7)2^bq+5gcepve*+^iv4mkkp@q*d6=xf#k#r64349x-ea}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1}"
      DB_ENGINE: "${DB_ENGINE:-django.db.backends.postgresql}"
      DB_NAME: "${DB_NAME:-erp_db}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "${DB_PORT:-5432}"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp_network

  # (Opcional) Nginx para servir conteúdo estático em produção
  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - erp_network
    # Descomente para usar em produção:
    # restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  erp_network:
    driver: bridge
